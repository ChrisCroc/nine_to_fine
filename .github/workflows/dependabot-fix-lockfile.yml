name: Dependabot — fix Gemfile.lock CHECKSUMS

on:
  pull_request_target:
    paths:
      - "Gemfile.lock"

# Pas de permissions globales — granulaire au niveau du job (principe du moindre privilège)
permissions: {}

jobs:
  fix-checksums:
    name: Regenerate Gemfile.lock CHECKSUMS
    # GARDE-FOU SÉCURITÉ — tourne UNIQUEMENT pour Dependabot sur branches bundler
    if: >-
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/bundler/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour push le commit fix sur la branche de la PR
    steps:
      - name: Checkout the Dependabot branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Install the Bundler version pinned in Gemfile.lock
        run: |
          BUNDLER_VERSION="$(grep -A 1 'BUNDLED WITH' Gemfile.lock | tail -n 1 | tr -d ' ')"
          echo "Pinned Bundler version: $BUNDLER_VERSION"
          gem install bundler -v "$BUNDLER_VERSION"

      - name: Regenerate Gemfile.lock with proper CHECKSUMS
        run: |
          bundle install
          bundle lock --add-checksums

      - name: Commit and push the fix (if any)
        run: |
          if git diff --quiet Gemfile.lock; then
            echo "No lockfile changes needed — already correct."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Gemfile.lock
          git commit -m "fix(deps): regenerate Gemfile.lock CHECKSUMS"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
